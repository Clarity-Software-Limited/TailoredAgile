<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailoredAgile | Practice Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <main class="practice-layout">
      <section class="practice-panel">
        <a href="index.html" class="back-link">Back to Catalog</a>
        <p id="practiceType" class="eyebrow"></p>
        <h1 id="practiceTitle"></h1>
        <p id="practiceDescription" class="section-lead"></p>

        <div class="summary-grid">
          <article class="summary-card">
            <h2>Overview</h2>
            <p id="sectionOverview"></p>
          </article>
          <article class="summary-card">
            <h2>Good</h2>
            <p id="sectionGood"></p>
          </article>
          <article class="summary-card">
            <h2>Bad</h2>
            <p id="sectionBad"></p>
          </article>
          <article class="summary-card">
            <h2>Ugly</h2>
            <p id="sectionUgly"></p>
          </article>
        </div>
      </section>
    </main>

    <script src="catalog-data.js"></script>
    <script src="practice.js"></script>
  </body>
</html>
